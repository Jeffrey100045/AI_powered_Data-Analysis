services:
  # 1. The Backend (Python/FastAPI)
  - type: web
    name: kavi-backend
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile   # ← path relative to repo root
    dockerContext: backend               # ← build context relative to repo root
    envVars:
      - key: GEMINI_API_KEY
        sync: false

  # 2. The Frontend (React/Vite with Nginx)
  - type: web
    name: kavi-frontend
    runtime: docker
    plan: free
    dockerfilePath: frontend/Dockerfile  # ← path relative to repo root
    dockerContext: frontend              # ← build context relative to repo root