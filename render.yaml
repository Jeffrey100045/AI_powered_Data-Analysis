services:
  # 1. The Backend (Python/FastAPI)
  - type: web
    name: kavi-backend
    runtime: docker
    plan: free
    rootDirectory: backend
    dockerFilePath: Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false

  # 2. The Frontend (React/Vite with Nginx)
  - type: web
    name: kavi-frontend
    runtime: docker
    plan: free
    rootDirectory: frontend
    dockerFilePath: Dockerfile
