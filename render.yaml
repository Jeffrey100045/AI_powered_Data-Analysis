services:
  # 1. The Backend (Python/FastAPI)
  - type: web
    name: kavi-backend
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile   # ← path relative to repo root
    dockerContext: backend               # ← build context relative to repo root
    envVars:
      - key: GEMINI_API_KEY
        sync: false

  # 2. The Frontend (React/Vite with Nginx)
  - type: web
    name: kavi-frontend
    runtime: docker
    plan: free
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
      - key: VITE_API_URL
        value: https://kavi-backend-m6c9.onrender.com